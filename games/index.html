<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word splash - Wonder Pond</title>
<meta name="description" content="A team spelling showdown at the pond. Fill in the missing letter before the splash! A free classroom game from Wonder Pond.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#12403A;
  --ink-soft:#33625C;
  --teal:#1F6E68;
  --teal-dark:#0F5A50;
  --green:#3F9457;
  --green-light:#4FB06A;
  --sky:#DFF2FA;
  --water:#8FCDE8;
  --water-deep:#6BB6DB;
  --amber:#F5C84C;
  --amber-dark:#C99A17;
  --red:#E24B4A;
  --t1:#4FB06A;
  --t2:#3FA7A3;
  --t3:#D06A8C;
  --t4:#3D7EC2;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Nunito",system-ui,sans-serif;
  color:var(--ink);
  background:linear-gradient(180deg,var(--sky) 0%,var(--sky) 40%,var(--water) 40%,var(--water-deep) 100%);
  min-height:100vh;display:flex;flex-direction:column;
}
h1,h2,button,.baloo{font-family:"Baloo 2",sans-serif}
:focus-visible{outline:4px solid var(--amber);outline-offset:3px;border-radius:8px}

.topbar{display:flex;align-items:center;gap:12px;padding:12px 18px}
.topbar a{
  font-family:"Baloo 2",sans-serif;font-weight:600;color:var(--teal-dark);
  text-decoration:none;background:rgba(255,255,255,.85);
  padding:8px 16px;border-radius:999px;font-size:.95rem;
}
.topbar a:hover{background:#fff}
.spacer{flex:1}
.icon-btn{
  background:rgba(255,255,255,.85);border:none;border-radius:999px;
  width:44px;height:44px;font-size:1.2rem;cursor:pointer;color:var(--teal-dark);
}
.icon-btn:hover{background:#fff}

.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 16px 30px}
.screen{width:100%;max-width:980px;text-align:center}
.hidden{display:none !important}

.card{
  background:rgba(255,255,255,.93);border-radius:28px;padding:34px 26px;
  box-shadow:0 12px 40px rgba(18,64,58,.18);
}
.card h1{font-size:clamp(2rem,5vw,3rem);color:var(--teal-dark)}
.card .sub{font-size:1.15rem;color:var(--ink-soft);margin:6px 0 24px}
.choose-label{font-weight:700;font-size:1.05rem;margin-bottom:12px;display:block}
.team-picks{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:26px}
.team-pick{
  font-family:"Baloo 2",sans-serif;font-size:1.25rem;font-weight:700;
  padding:16px 24px;min-width:110px;border-radius:18px;cursor:pointer;
  border:3px solid var(--teal);background:#fff;color:var(--teal-dark);
  transition:transform .12s ease;
}
.team-pick:hover{transform:translateY(-3px)}
.team-pick[aria-pressed="true"]{background:var(--teal);color:#fff}
.big-btn{
  font-size:1.5rem;font-weight:700;padding:18px 46px;border-radius:999px;
  border:none;background:var(--green-light);color:#fff;cursor:pointer;
  box-shadow:0 6px 0 var(--green);transition:transform .12s ease;
  font-family:"Baloo 2",sans-serif;
}
.big-btn:hover{transform:translateY(-2px)}
.big-btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--green)}
.big-btn.alt{background:#fff;color:var(--teal-dark);box-shadow:0 6px 0 #C9C2AC}

/* Scoreboard */
.scoreboard{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
.team-chip{
  display:flex;align-items:center;gap:8px;border-radius:999px;padding:8px 18px;
  font-family:"Baloo 2",sans-serif;font-weight:700;font-size:1.1rem;color:#fff;
  opacity:.55;transform:scale(.96);transition:opacity .2s ease,transform .2s ease;
}
.team-chip.active{opacity:1;transform:scale(1.06);box-shadow:0 4px 14px rgba(18,64,58,.3)}
.team-chip .dot{width:10px;height:10px;border-radius:50%;background:#fff}
.hud-chip{
  background:rgba(255,255,255,.92);border-radius:999px;padding:8px 18px;
  font-family:"Baloo 2",sans-serif;font-weight:700;font-size:1.05rem;color:var(--teal-dark);
  display:inline-block;margin-bottom:8px;
}

.turn-banner{
  font-family:"Baloo 2",sans-serif;font-size:clamp(1.3rem,3.2vw,1.9rem);font-weight:700;
  color:#fff;display:inline-block;padding:8px 30px;border-radius:999px;margin-bottom:14px;
}

/* Word tiles */
.word-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:8px 0 6px}
.tile{
  width:clamp(44px,7vw,66px);height:clamp(56px,8.5vw,80px);
  background:#fff;border-radius:14px;border:3px solid #C9E2DE;
  display:flex;align-items:center;justify-content:center;
  font-family:"Baloo 2",sans-serif;font-weight:700;
  font-size:clamp(1.6rem,4vw,2.4rem);color:var(--teal-dark);text-transform:lowercase;
}
.tile.blank{background:var(--amber);border-color:var(--amber-dark);color:#5A4407}
.tile.filled{background:var(--green-light);border-color:var(--green);color:#fff}
@keyframes tilePop{0%{transform:scale(.6)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.tile.pop{animation:tilePop .35s ease}
.hear-btn{
  margin:10px auto 4px;display:inline-flex;align-items:center;gap:8px;
  font-family:"Baloo 2",sans-serif;font-weight:700;font-size:1.05rem;
  background:rgba(255,255,255,.92);border:none;border-radius:999px;
  padding:10px 22px;cursor:pointer;color:var(--teal-dark);
}
.hear-btn:hover{background:#fff}

/* Letter choices */
.choices{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:14px}
.choice{
  font-family:"Baloo 2",sans-serif;font-size:clamp(1.9rem,4.5vw,2.8rem);font-weight:700;
  min-width:96px;min-height:88px;padding:8px 22px;text-transform:lowercase;
  border-radius:22px;border:none;background:#fff;color:var(--teal-dark);
  cursor:pointer;box-shadow:0 6px 0 rgba(18,64,58,.25);transition:transform .12s ease;
}
.choice:hover:enabled{transform:translateY(-3px)}
.choice:active:enabled{transform:translateY(3px);box-shadow:0 2px 0 rgba(18,64,58,.25)}
.choice.correct{background:var(--green-light);color:#fff;box-shadow:0 6px 0 var(--green)}
.choice.wrong{background:var(--red);color:#fff;opacity:.85}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.choice.shake{animation:shake .35s ease}
.choice:disabled{cursor:default}

.feedback{
  font-family:"Baloo 2",sans-serif;font-size:1.2rem;font-weight:700;
  color:var(--teal-dark);min-height:2em;margin-top:12px;
}
.feedback .splash-word{color:var(--green)}

/* Frog helper */
.frog-corner{position:fixed;left:14px;bottom:10px;width:92px;pointer-events:none}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.frog-corner.bobbing{animation:bob 3s ease-in-out infinite}
@keyframes splashPop{
  0%{opacity:1;transform:scale(.4)}
  80%{opacity:1;transform:scale(1.2)}
  100%{opacity:0;transform:scale(1.35)}
}
.splash-fx{position:fixed;left:34px;bottom:70px;width:80px;animation:splashPop .6s ease forwards;pointer-events:none}

/* End screen */
.winner-name{
  font-family:"Baloo 2",sans-serif;font-size:clamp(1.6rem,4.5vw,2.4rem);font-weight:700;
  color:#fff;display:inline-block;padding:10px 34px;border-radius:999px;margin:8px 0;
}
.final-scores{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:14px 0 22px}
.final-chip{
  border-radius:999px;padding:9px 20px;color:#fff;
  font-family:"Baloo 2",sans-serif;font-weight:700;font-size:1.1rem;
}
.stars{font-size:2.6rem;letter-spacing:8px;margin:4px 0 16px}
.stars .on{color:var(--amber)}
.end-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}

@media (prefers-reduced-motion:reduce){
  *{animation:none !important;transition:none !important}
}
@media (max-width:640px){
  .frog-corner{display:none}
  .choices{gap:10px}
}
</style>
</head>
<body>

<div class="topbar">
  <a href="../../">&#8592; Back to the pond</a>
  <span class="spacer"></span>
  <button class="icon-btn" id="soundBtn" onclick="toggleSound()" aria-label="Turn sound off" aria-pressed="true">&#9835;</button>
</div>

<main class="stage">

  <!-- Start screen -->
  <section class="screen" id="startScreen" aria-labelledby="gameTitle">
    <div class="card">
      <svg width="130" height="95" viewBox="0 0 130 95" aria-hidden="true" style="margin:0 auto 4px">
        <circle cx="34" cy="30" r="13" fill="#8FCDE8"/>
        <circle cx="97" cy="22" r="9" fill="#8FCDE8"/>
        <circle cx="112" cy="44" r="6" fill="#8FCDE8"/>
        <ellipse cx="65" cy="58" rx="26" ry="20" fill="#4FB06A"/>
        <ellipse cx="47" cy="72" rx="10" ry="6" fill="#3F9457"/>
        <ellipse cx="83" cy="72" rx="10" ry="6" fill="#3F9457"/>
        <circle cx="55" cy="36" r="10" fill="#4FB06A"/>
        <circle cx="75" cy="36" r="10" fill="#4FB06A"/>
        <circle cx="55" cy="36" r="6.5" fill="#fff"/>
        <circle cx="75" cy="36" r="6.5" fill="#fff"/>
        <circle cx="56" cy="37" r="3" fill="#22303B"/>
        <circle cx="76" cy="37" r="3" fill="#22303B"/>
        <path d="M53 62 Q65 72 77 62" stroke="#1F5B36" stroke-width="3" fill="none" stroke-linecap="round"/>
      </svg>
      <h1 id="gameTitle">Word splash</h1>
      <p class="sub">Hop says a word. Your team fills in the missing letter. Make a splash!</p>
      <span class="choose-label" id="teamLabel">How many teams?</span>
      <div class="team-picks" role="group" aria-labelledby="teamLabel">
        <button class="team-pick" data-teams="1" aria-pressed="false" onclick="chooseTeams(this)">Just us</button>
        <button class="team-pick" data-teams="2" aria-pressed="true" onclick="chooseTeams(this)">2 teams</button>
        <button class="team-pick" data-teams="3" aria-pressed="false" onclick="chooseTeams(this)">3 teams</button>
        <button class="team-pick" data-teams="4" aria-pressed="false" onclick="chooseTeams(this)">4 teams</button>
      </div>
      <button class="big-btn" onclick="startGame()">Splash in!</button>
    </div>
  </section>

  <!-- Game screen -->
  <section class="screen hidden" id="gameScreen">
    <div class="scoreboard" id="scoreboard"></div>
    <span class="hud-chip" id="roundChip">Word 1 of 10</span>
    <div>
      <span class="turn-banner" id="turnBanner">Team Hop's turn!</span>
    </div>
    <div class="word-row" id="wordRow" aria-hidden="true"></div>
    <button class="hear-btn" onclick="sayWord(true)" id="hearBtn">&#128266; Hear the word again</button>
    <div class="choices" id="choices" role="group" aria-label="Letter choices"></div>
    <p class="feedback" id="feedback"></p>
  </section>

  <!-- End screen -->
  <section class="screen hidden" id="endScreen" aria-labelledby="endTitle">
    <div class="card">
      <h2 id="endTitle" style="font-size:clamp(1.8rem,4.5vw,2.6rem);color:var(--teal-dark)">And the winner is...</h2>
      <span class="winner-name" id="winnerName">Team Hop!</span>
      <div class="stars" id="starRow" aria-hidden="true"><span class="on">&#9733;</span><span class="on">&#9733;</span><span class="on">&#9733;</span></div>
      <div class="final-scores" id="finalScores"></div>
      <div class="end-actions">
        <button class="big-btn" onclick="startGame()">Play again</button>
        <button class="big-btn alt" onclick="backToStart()">Change teams</button>
      </div>
    </div>
  </section>
</main>

<svg class="frog-corner bobbing" viewBox="0 0 120 100" aria-hidden="true">
  <ellipse cx="60" cy="62" rx="26" ry="20" fill="#4FB06A"/>
  <ellipse cx="42" cy="76" rx="10" ry="6" fill="#3F9457"/>
  <ellipse cx="78" cy="76" rx="10" ry="6" fill="#3F9457"/>
  <circle cx="50" cy="40" r="10" fill="#4FB06A"/>
  <circle cx="70" cy="40" r="10" fill="#4FB06A"/>
  <circle cx="50" cy="40" r="6.5" fill="#fff"/>
  <circle cx="70" cy="40" r="6.5" fill="#fff"/>
  <circle cx="51" cy="41" r="3" fill="#22303B"/>
  <circle cx="71" cy="41" r="3" fill="#22303B"/>
  <path d="M48 66 Q60 76 72 66" stroke="#1F5B36" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>

<div aria-live="polite" class="hidden" id="srStatus"></div>

<script>
/* Each entry: word, index of the tricky blank letter, letter choices (first one is correct). */
var WORDS = [
  { w: 'because', b: 3, c: ['a','o','u','e'] },
  { w: 'friend', b: 2, c: ['i','e','a','y'] },
  { w: 'believe', b: 3, c: ['i','e','a','y'] },
  { w: 'receive', b: 3, c: ['e','i','a','y'] },
  { w: 'beautiful', b: 1, c: ['e','u','a','o'] },
  { w: 'different', b: 4, c: ['e','a','i','u'] },
  { w: 'favorite', b: 3, c: ['o','u','e','a'] },
  { w: 'separate', b: 3, c: ['a','e','i','u'] },
  { w: 'definitely', b: 5, c: ['i','a','e','u'] },
  { w: 'surprise', b: 2, c: ['r','p','b','s'] },
  { w: 'which', b: 2, c: ['i','e','a','o'] },
  { w: 'people', b: 2, c: ['o','a','e','u'] },
  { w: 'usually', b: 2, c: ['u','e','a','o'] },
  { w: 'caught', b: 1, c: ['a','o','u','e'] },
  { w: 'thought', b: 2, c: ['o','a','u','e'] },
  { w: 'enough', b: 2, c: ['o','u','a','e'] },
  { w: 'island', b: 1, c: ['s','c','z','l'] },
  { w: 'school', b: 2, c: ['h','k','w','l'] },
  { w: 'answer', b: 3, c: ['w','e','o','u'] },
  { w: 'minute', b: 3, c: ['u','i','e','a'] },
  { w: 'library', b: 4, c: ['a','e','i','u'] },
  { w: 'February', b: 4, c: ['u','e','a','o'] },
  { w: 'Wednesday', b: 2, c: ['d','n','s','t'] },
  { w: 'stomach', b: 5, c: ['c','k','t','s'] },
  { w: 'knee', b: 0, c: ['k','n','g','c'] },
  { w: 'write', b: 0, c: ['w','r','k','g'] },
  { w: 'climb', b: 4, c: ['b','e','p','m'] },
  { w: 'often', b: 2, c: ['t','f','e','i'] },
  { w: 'listen', b: 3, c: ['t','s','e','d'] },
  { w: 'chocolate', b: 4, c: ['o','a','e','u'] },
  { w: 'vegetable', b: 3, c: ['e','a','i','u'] },
  { w: 'probably', b: 4, c: ['a','e','i','u'] },
  { w: 'restaurant', b: 7, c: ['a','e','i','u'] },
  { w: 'calendar', b: 6, c: ['a','e','o','u'] },
  { w: 'grammar', b: 5, c: ['a','e','o','u'] },
  { w: 'neighbor', b: 1, c: ['e','a','i','y'] },
  { w: 'weird', b: 1, c: ['e','i','a','y'] },
  { w: 'piece', b: 1, c: ['i','e','a','y'] },
  { w: 'quiet', b: 2, c: ['i','e','a','o'] },
  { w: 'tongue', b: 4, c: ['u','a','o','e'] }
];

var TEAM_INFO = [
  { name: 'Team Hop', color: 'var(--t1)' },
  { name: 'Team Skip', color: 'var(--t2)' },
  { name: 'Team Lily', color: 'var(--t3)' },
  { name: 'Team Splash', color: 'var(--t4)' }
];
var WORDS_PER_TEAM = 5;
var SOLO_WORDS = 10;

var teamCount = 2;
var scores = [];
var deck = [];
var turn = 0;
var wordIndex = 0;
var totalWords = 10;
var current = null;
var busy = false;
var soundOn = true;
var audioCtx = null;

function $(id){ return document.getElementById(id); }

function chooseTeams(btn){
  document.querySelectorAll('.team-pick').forEach(function(b){ b.setAttribute('aria-pressed','false'); });
  btn.setAttribute('aria-pressed','true');
  teamCount = parseInt(btn.dataset.teams, 10);
}

function toggleSound(){
  soundOn = !soundOn;
  var b = $('soundBtn');
  b.setAttribute('aria-pressed', soundOn ? 'true' : 'false');
  b.setAttribute('aria-label', soundOn ? 'Turn sound off' : 'Turn sound on');
  b.style.opacity = soundOn ? '1' : '.45';
  if (!soundOn && window.speechSynthesis) window.speechSynthesis.cancel();
}

function beep(freqs, dur){
  if (!soundOn) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var t = audioCtx.currentTime;
    freqs.forEach(function(f, i){
      var o = audioCtx.createOscillator();
      var g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.value = f;
      g.gain.setValueAtTime(0.001, t + i * dur);
      g.gain.exponentialRampToValueAtTime(0.18, t + i * dur + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * dur + dur);
      o.connect(g).connect(audioCtx.destination);
      o.start(t + i * dur);
      o.stop(t + i * dur + dur + 0.05);
    });
  } catch(e) {}
}
function sndGood(){ beep([523, 659, 784], 0.11); }
function sndBad(){ beep([220, 180], 0.14); }
function sndWin(){ beep([523, 659, 784, 1047], 0.13); }

function sayWord(fromButton){
  if (!soundOn && fromButton !== true) return;
  if (!current || !window.speechSynthesis) return;
  try {
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(current.w);
    u.lang = 'en-US';
    u.rate = 0.85;
    window.speechSynthesis.speak(u);
  } catch(e) {}
}

function shuffle(arr){
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function startGame(){
  scores = [];
  for (var i = 0; i < teamCount; i++) scores.push(0);
  totalWords = teamCount === 1 ? SOLO_WORDS : teamCount * WORDS_PER_TEAM;
  deck = shuffle(WORDS).slice(0, totalWords);
  turn = 0;
  wordIndex = 0;
  $('startScreen').classList.add('hidden');
  $('endScreen').classList.add('hidden');
  $('gameScreen').classList.remove('hidden');
  buildScoreboard();
  nextWord();
}

function backToStart(){
  $('endScreen').classList.add('hidden');
  $('gameScreen').classList.add('hidden');
  $('startScreen').classList.remove('hidden');
}

function buildScoreboard(){
  var sb = $('scoreboard');
  sb.innerHTML = '';
  for (var i = 0; i < teamCount; i++) {
    var chip = document.createElement('span');
    chip.className = 'team-chip';
    chip.id = 'team' + i;
    chip.style.background = TEAM_INFO[i].color;
    chip.innerHTML = '<span class="dot"></span>' + TEAM_INFO[i].name + ': <span id="score' + i + '">0</span>';
    sb.appendChild(chip);
  }
}

function nextWord(){
  if (wordIndex >= totalWords) { endGame(); return; }
  current = deck[wordIndex];
  busy = false;

  $('roundChip').textContent = 'Word ' + (wordIndex + 1) + ' of ' + totalWords;
  var banner = $('turnBanner');
  if (teamCount === 1) {
    banner.textContent = 'Listen and spell!';
    banner.style.background = 'var(--teal)';
  } else {
    banner.textContent = TEAM_INFO[turn].name + "'s turn!";
    banner.style.background = TEAM_INFO[turn].color;
  }
  for (var i = 0; i < teamCount; i++) {
    $('team' + i).classList.toggle('active', teamCount > 1 && i === turn);
  }
  $('feedback').textContent = '';

  var row = $('wordRow');
  row.innerHTML = '';
  var letters = current.w.split('');
  letters.forEach(function(ch, idx){
    var tile = document.createElement('span');
    tile.className = 'tile' + (idx === current.b ? ' blank' : '');
    tile.id = 'tile' + idx;
    tile.textContent = idx === current.b ? '?' : ch;
    row.appendChild(tile);
  });

  var box = $('choices');
  box.innerHTML = '';
  shuffle(current.c).forEach(function(letter, i){
    var b = document.createElement('button');
    b.className = 'choice';
    b.textContent = letter;
    b.dataset.key = (i + 1);
    b.onclick = function(){ pick(b, letter); };
    box.appendChild(b);
  });

  var display = letters.map(function(ch, idx){ return idx === current.b ? 'blank' : ch; }).join(' ');
  $('srStatus').textContent = (teamCount > 1 ? TEAM_INFO[turn].name + '. ' : '') + 'Spell the word. Letters: ' + display + '.';
  setTimeout(sayWord, 350);
}

function fillTile(){
  var tile = $('tile' + current.b);
  tile.textContent = current.c[0];
  tile.classList.remove('blank');
  tile.classList.add('filled', 'pop');
}

function showSplash(){
  var s = document.createElement('div');
  s.className = 'splash-fx';
  s.innerHTML = '<svg viewBox="0 0 90 60"><circle cx="20" cy="40" r="7" fill="#BFE3F2"/><circle cx="45" cy="18" r="10" fill="#BFE3F2"/><circle cx="72" cy="36" r="7" fill="#BFE3F2"/></svg>';
  document.body.appendChild(s);
  setTimeout(function(){ s.remove(); }, 700);
}

function pick(btn, letter){
  if (busy) return;
  busy = true;
  var correct = letter === current.c[0];
  document.querySelectorAll('.choice').forEach(function(b){ b.disabled = true; });

  if (correct) {
    btn.classList.add('correct');
    scores[teamCount === 1 ? 0 : turn]++;
    $('score' + (teamCount === 1 ? 0 : turn)).textContent = scores[teamCount === 1 ? 0 : turn];
    fillTile();
    showSplash();
    sndGood();
    $('feedback').innerHTML = 'Splash! <span class="splash-word">' + current.w + '</span> is right!';
    $('srStatus').textContent = 'Correct! The word is ' + current.w + '.';
  } else {
    btn.classList.add('wrong', 'shake');
    document.querySelectorAll('.choice').forEach(function(b){
      if (b.textContent === current.c[0]) b.classList.add('correct');
    });
    fillTile();
    sndBad();
    $('feedback').innerHTML = 'Almost! It is spelled <span class="splash-word">' + current.w + '</span>.';
    $('srStatus').textContent = 'Not quite. The word is spelled ' + current.w + '.';
  }

  wordIndex++;
  if (teamCount > 1) turn = (turn + 1) % teamCount;
  setTimeout(nextWord, 2300);
}

function endGame(){
  $('gameScreen').classList.add('hidden');
  $('endScreen').classList.remove('hidden');
  var fs = $('finalScores');
  fs.innerHTML = '';
  for (var i = 0; i < teamCount; i++) {
    var chip = document.createElement('span');
    chip.className = 'final-chip';
    chip.style.background = TEAM_INFO[i].color;
    chip.textContent = TEAM_INFO[i].name + ': ' + scores[i];
    fs.appendChild(chip);
  }
  var title = $('endTitle');
  var winName = $('winnerName');
  if (teamCount === 1) {
    title.textContent = 'Great spelling!';
    winName.textContent = 'You got ' + scores[0] + ' of ' + totalWords + '!';
    winName.style.background = 'var(--teal)';
    $('srStatus').textContent = 'Game over. You got ' + scores[0] + ' of ' + totalWords + '.';
  } else {
    var best = Math.max.apply(null, scores);
    var winners = [];
    for (var j = 0; j < teamCount; j++) {
      if (scores[j] === best) winners.push(j);
    }
    if (winners.length === 1) {
      title.textContent = 'And the winner is...';
      winName.textContent = TEAM_INFO[winners[0]].name + '!';
      winName.style.background = TEAM_INFO[winners[0]].color;
      $('srStatus').textContent = 'The winner is ' + TEAM_INFO[winners[0]].name + '.';
    } else {
      title.textContent = 'It is a tie!';
      winName.textContent = winners.map(function(w){ return TEAM_INFO[w].name; }).join(' and ');
      winName.style.background = 'var(--teal)';
      $('srStatus').textContent = 'It is a tie between ' + winners.map(function(w){ return TEAM_INFO[w].name; }).join(' and ') + '.';
    }
  }
  sndWin();
}

document.addEventListener('keydown', function(e){
  if (e.key >= '1' && e.key <= '4') {
    var b = document.querySelector('.choice[data-key="' + e.key + '"]');
    if (b && !b.disabled) b.click();
  }
});
</script>
