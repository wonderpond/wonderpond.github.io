<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lily fractions - Wonder Pond</title>
<meta name="description" content="Read the lily pad and pick the matching fraction. A free fractions game for grades 3 to 5 from Wonder Pond.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#12403A;--ink-soft:#33625C;--teal:#1F6E68;--teal-dark:#0F5A50;
  --green:#3F9457;--green-light:#4FB06A;--sky:#DFF2FA;--water:#8FCDE8;--water-deep:#6BB6DB;
  --amber:#F5C84C;--amber-dark:#C99A17;--red:#E24B4A;
  --pad:#2E8B57;--pad-fill:#7DD69B;--pad-empty:#E4F3E9;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Nunito",system-ui,sans-serif;color:var(--ink);
  background:linear-gradient(180deg,var(--sky) 0%,var(--sky) 55%,var(--water) 55%,var(--water-deep) 100%);
  min-height:100vh;display:flex;flex-direction:column;
}
h1,h2,button,.baloo{font-family:"Baloo 2",sans-serif}
:focus-visible{outline:4px solid var(--amber);outline-offset:3px;border-radius:8px}
.topbar{display:flex;align-items:center;gap:12px;padding:12px 18px}
.topbar a{font-family:"Baloo 2",sans-serif;font-weight:600;color:var(--teal-dark);text-decoration:none;background:rgba(255,255,255,.85);padding:8px 16px;border-radius:999px;font-size:.95rem}
.topbar a:hover{background:#fff}
.spacer{flex:1}
.icon-btn{background:rgba(255,255,255,.85);border:none;border-radius:999px;width:44px;height:44px;font-size:1.2rem;cursor:pointer;color:var(--teal-dark)}
.icon-btn:hover{background:#fff}
.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 16px 24px}
.screen{width:100%;max-width:940px;text-align:center}
.hidden{display:none !important}

.card{background:rgba(255,255,255,.93);border-radius:28px;padding:30px 24px;box-shadow:0 12px 40px rgba(18,64,58,.18)}
.card h1{font-size:clamp(2rem,5vw,3rem);color:var(--teal-dark)}
.card .sub{font-size:1.15rem;color:var(--ink-soft);margin:6px 0 22px}
.choose-label{font-weight:700;font-size:1.05rem;margin:6px 0 12px;display:block}
.modes{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
.mode-btn{
  font-family:"Baloo 2",sans-serif;font-size:1.15rem;font-weight:700;
  padding:16px 20px;min-width:180px;border-radius:18px;cursor:pointer;
  border:3px solid var(--teal);background:#fff;color:var(--teal-dark);transition:transform .12s ease;
}
.mode-btn:hover{transform:translateY(-3px)}
.mode-btn[aria-pressed="true"]{background:var(--teal);color:#fff}
.mode-btn small{display:block;font-family:"Nunito",sans-serif;font-weight:700;font-size:.82rem;opacity:.8;margin-top:3px}
.big-btn{
  font-family:"Baloo 2",sans-serif;font-size:1.4rem;font-weight:700;
  padding:16px 42px;border-radius:999px;border:none;background:var(--green-light);color:#fff;cursor:pointer;
  box-shadow:0 6px 0 var(--green);transition:transform .12s ease;margin-top:16px;
}
.big-btn:hover{transform:translateY(-2px)}
.big-btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--green)}
.big-btn.alt{background:#fff;color:var(--teal-dark);box-shadow:0 6px 0 #C9C2AC}

.hud{display:flex;justify-content:center;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.chip{background:rgba(255,255,255,.92);border-radius:999px;padding:8px 20px;font-family:"Baloo 2",sans-serif;font-weight:700;font-size:1.1rem;color:var(--teal-dark)}
.prompt{
  font-family:"Baloo 2",sans-serif;font-size:clamp(1.3rem,3.2vw,1.9rem);font-weight:700;color:var(--teal-dark);
  background:rgba(255,255,255,.85);display:inline-block;padding:7px 26px;border-radius:999px;margin:4px 0 4px;
}

.pad-zone{display:flex;gap:20px;justify-content:center;align-items:center;flex-wrap:wrap;margin:8px 0 4px}
.pad-svg{width:min(60vw,230px)}
@keyframes padPop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.pad-svg.pop{animation:padPop .3s ease}

/* Fraction display */
.frac{
  display:inline-flex;flex-direction:column;align-items:center;line-height:1;
  font-family:"Baloo 2",sans-serif;font-weight:700;
}
.frac .top{padding:0 6px}
.frac .bar{width:100%;min-width:34px;height:4px;background:currentColor;border-radius:2px;margin:3px 0}
.frac.big{font-size:clamp(2.6rem,8vw,4rem);color:var(--teal-dark)}

/* Choices */
.choices{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.choice{
  min-width:120px;min-height:96px;padding:12px 22px;border-radius:22px;border:none;background:#fff;
  cursor:pointer;box-shadow:0 6px 0 rgba(18,64,58,.25);transition:transform .12s ease;
  color:var(--teal-dark);display:inline-flex;align-items:center;justify-content:center;
}
.choice:hover:enabled{transform:translateY(-3px)}
.choice:active:enabled{transform:translateY(3px);box-shadow:0 2px 0 rgba(18,64,58,.25)}
.choice .frac{font-size:clamp(1.7rem,5vw,2.4rem)}
.choice.correct{background:var(--green-light);box-shadow:0 6px 0 var(--green)}
.choice.correct .frac{color:#fff}
.choice.wrong{background:var(--red)}
.choice.wrong .frac{color:#fff}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.choice.shake{animation:shake .35s ease}
.choice:disabled{cursor:default}

.feedback{font-family:"Baloo 2",sans-serif;font-size:1.15rem;font-weight:700;color:var(--teal-dark);min-height:1.7em;margin-top:12px}
.feedback .hi{color:var(--green)}

/* End */
.stars{font-size:3rem;letter-spacing:8px;margin:8px 0 18px}
.stars .on{color:var(--amber)}
.stars .off{color:#D8D3C2}
.end-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.score-line{font-size:1.3rem;color:var(--ink-soft);margin-bottom:6px}

@media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}
</style>
</head>
<body>

<div class="topbar">
  <a href="../../">&#8592; Back to the pond</a>
  <span class="spacer"></span>
  <button class="icon-btn" id="soundBtn" onclick="toggleSound()" aria-label="Turn sound off" aria-pressed="true">&#9835;</button>
</div>

<main class="stage">

  <!-- Start -->
  <section class="screen" id="startScreen" aria-labelledby="gameTitle">
    <div class="card">
      <svg width="120" height="90" viewBox="0 0 120 90" aria-hidden="true" style="margin:0 auto 2px">
        <ellipse cx="60" cy="80" rx="46" ry="8" fill="#BFE3F2"/>
        <circle cx="60" cy="46" r="38" fill="#7DD69B"/>
        <path d="M60 46 L60 8 A38 38 0 0 1 93 65 Z" fill="#2E8B57"/>
        <path d="M60 46 L60 8 M60 46 L93 65 M60 46 L27 65" stroke="#1F6E44" stroke-width="2.5"/>
        <path d="M60 8 L60 -2" stroke="#2E8B57" stroke-width="3"/>
      </svg>
      <h1 id="gameTitle">Lily fractions</h1>
      <p class="sub">Hop nibbles part of each lily pad. Can you name the fraction?</p>
      <span class="choose-label" id="modeLabel">Pick your challenge</span>
      <div class="modes" role="group" aria-labelledby="modeLabel">
        <button class="mode-btn" data-mode="name" aria-pressed="true" onclick="chooseMode(this)">Name the fraction<small>See the pad, pick the fraction</small></button>
        <button class="mode-btn" data-mode="show" aria-pressed="false" onclick="chooseMode(this)">Find the picture<small>See the fraction, pick the pad</small></button>
        <button class="mode-btn" data-mode="compare" aria-pressed="false" onclick="chooseMode(this)">Bigger bite<small>Which fraction is greater?</small></button>
      </div>
      <button class="big-btn" onclick="startGame()">Let's go!</button>
    </div>
  </section>

  <!-- Game -->
  <section class="screen hidden" id="gameScreen">
    <div class="hud">
      <span class="chip" id="roundChip">Round 1 of 10</span>
      <span class="chip" id="scoreChip">Score 0</span>
    </div>
    <div><span class="prompt" id="prompt">What fraction is shaded?</span></div>
    <div class="pad-zone" id="padZone"></div>
    <div class="choices" id="choices"></div>
    <p class="feedback" id="feedback"></p>
  </section>

  <!-- End -->
  <section class="screen hidden" id="endScreen" aria-labelledby="endTitle">
    <div class="card">
      <svg width="110" height="95" viewBox="0 0 240 204" aria-hidden="true" style="margin:0 auto">
        <circle cx="120" cy="66" r="36" fill="#F6C9A2"/>
        <path d="M84 68 Q83 24 120 22 Q157 24 158 68 Q147 48 120 47 Q93 48 84 68 Z" fill="#6B4A2F"/>
        <circle cx="120" cy="21" r="7" fill="#6B4A2F"/>
        <path d="M103 64 Q109 57 115 64" stroke="#3A2A1E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M125 64 Q131 57 137 64" stroke="#3A2A1E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <circle cx="99" cy="74" r="5" fill="#F4A0A0" opacity="0.6"/>
        <circle cx="141" cy="74" r="5" fill="#F4A0A0" opacity="0.6"/>
        <path d="M102 75 Q120 94 138 75 Q120 85 102 75 Z" fill="#8A4B3B"/>
      </svg>
      <h2 id="endTitle" style="font-size:clamp(1.8rem,4.5vw,2.6rem);color:var(--teal-dark)">Well sliced!</h2>
      <p class="score-line" id="finalLine"></p>
      <div class="stars" id="starRow" aria-hidden="true"></div>
      <div class="end-actions">
        <button class="big-btn" onclick="startGame()">Play again</button>
        <button class="big-btn alt" onclick="backToStart()">Change challenge</button>
      </div>
    </div>
  </section>
</main>

<div aria-live="polite" class="hidden" id="srStatus"></div>

<script>
var TOTAL_ROUNDS = 10;
var DENOMS = [2, 3, 4, 5, 6, 8];

var mode = 'name';
var round = 0;
var score = 0;
var answer = null;
var firstTry = true;
var busy = false;
var soundOn = true;
var audioCtx = null;

function $(id){ return document.getElementById(id); }

function chooseMode(btn){
  document.querySelectorAll('.mode-btn').forEach(function(b){ b.setAttribute('aria-pressed','false'); });
  btn.setAttribute('aria-pressed','true');
  mode = btn.dataset.mode;
}
function toggleSound(){
  soundOn = !soundOn;
  var b = $('soundBtn');
  b.setAttribute('aria-pressed', soundOn ? 'true' : 'false');
  b.setAttribute('aria-label', soundOn ? 'Turn sound off' : 'Turn sound on');
  b.style.opacity = soundOn ? '1' : '.45';
}
function beep(freqs, dur){
  if (!soundOn) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var t = audioCtx.currentTime;
    freqs.forEach(function(f, i){
      var o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0.001, t + i * dur);
      g.gain.exponentialRampToValueAtTime(0.17, t + i * dur + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * dur + dur);
      o.connect(g).connect(audioCtx.destination);
      o.start(t + i * dur); o.stop(t + i * dur + dur + 0.05);
    });
  } catch(e) {}
}
function sndGood(){ beep([523, 659, 784], 0.11); }
function sndBad(){ beep([220, 180], 0.14); }
function sndWin(){ beep([523, 659, 784, 1047], 0.13); }

function shuffle(arr){
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function gcd(a, b){ return b === 0 ? a : gcd(b, a % b); }

/* Build a lily-pad pie SVG with `num` of `den` slices shaded */
function padSvg(num, den, size){
  var cx = 60, cy = 60, r = 46;
  var parts = '<ellipse cx="60" cy="104" rx="44" ry="7" fill="#BFE3F2"/>';
  parts += '<circle cx="60" cy="60" r="46" fill="#E4F3E9" stroke="#2E8B57" stroke-width="3"/>';
  for (var i = 0; i < den; i++) {
    var a0 = (i / den) * 2 * Math.PI - Math.PI / 2;
    var a1 = ((i + 1) / den) * 2 * Math.PI - Math.PI / 2;
    var x0 = cx + r * Math.cos(a0), y0 = cy + r * Math.sin(a0);
    var x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
    var large = (a1 - a0) > Math.PI ? 1 : 0;
    var fill = i < num ? '#7DD69B' : '#E4F3E9';
    if (den === 1) {
      parts += '<circle cx="60" cy="60" r="46" fill="' + fill + '"/>';
    } else {
      parts += '<path d="M' + cx + ' ' + cy + ' L' + x0.toFixed(2) + ' ' + y0.toFixed(2) +
        ' A' + r + ' ' + r + ' 0 ' + large + ' 1 ' + x1.toFixed(2) + ' ' + y1.toFixed(2) +
        ' Z" fill="' + fill + '" stroke="#1F6E44" stroke-width="2"/>';
    }
  }
  parts += '<circle cx="60" cy="60" r="46" fill="none" stroke="#2E8B57" stroke-width="3"/>';
  parts += '<path d="M60 14 L60 4" stroke="#2E8B57" stroke-width="3"/>';
  return '<svg class="pad-svg pop" viewBox="0 0 120 116" role="img" aria-label="Lily pad showing ' +
    num + ' out of ' + den + ' parts shaded">' + parts + '</svg>';
}

function fracHtml(n, d, cls){
  return '<span class="frac ' + (cls || '') + '"><span class="top">' + n + '</span><span class="bar"></span><span class="bot">' + d + '</span></span>';
}

function startGame(){
  round = 0;
  score = 0;
  $('startScreen').classList.add('hidden');
  $('endScreen').classList.add('hidden');
  $('gameScreen').classList.remove('hidden');
  nextRound();
}
function backToStart(){
  $('endScreen').classList.add('hidden');
  $('gameScreen').classList.add('hidden');
  $('startScreen').classList.remove('hidden');
}

function makeFraction(){
  var d = DENOMS[Math.floor(Math.random() * DENOMS.length)];
  var n = 1 + Math.floor(Math.random() * (d - 1));
  return { n: n, d: d };
}

function nextRound(){
  round++;
  if (round > TOTAL_ROUNDS) { endGame(); return; }
  busy = false;
  firstTry = true;
  $('roundChip').textContent = 'Round ' + round + ' of ' + TOTAL_ROUNDS;
  $('scoreChip').textContent = 'Score ' + score;
  $('feedback').textContent = '';
  var pz = $('padZone');
  var ch = $('choices');
  pz.innerHTML = '';
  ch.innerHTML = '';

  if (mode === 'name') buildName(pz, ch);
  else if (mode === 'show') buildShow(pz, ch);
  else buildCompare(pz, ch);
}

/* Mode 1: show a pad, pick the fraction */
function buildName(pz, ch){
  var f = makeFraction();
  answer = f.n + '/' + f.d;
  $('prompt').textContent = 'What fraction is shaded?';
  pz.innerHTML = padSvg(f.n, f.d);

  var opts = [{ n: f.n, d: f.d }];
  var guard = 0;
  while (opts.length < 3 && guard++ < 40) {
    var cand;
    var roll = Math.random();
    if (roll < 0.4) cand = { n: Math.max(1, Math.min(f.d - 1, f.n + (Math.random() < 0.5 ? 1 : -1))), d: f.d };
    else if (roll < 0.7) cand = { n: f.d - f.n, d: f.d };
    else { var nd = DENOMS[Math.floor(Math.random() * DENOMS.length)]; cand = { n: Math.max(1, Math.min(nd - 1, f.n)), d: nd }; }
    var key = cand.n + '/' + cand.d;
    if (!opts.some(function(o){ return o.n + '/' + o.d === key; })) opts.push(cand);
  }
  renderFractionChoices(ch, opts, function(o){ return o.n + '/' + o.d; });
  $('srStatus').textContent = 'A lily pad shows ' + f.n + ' of ' + f.d + ' parts shaded. Pick the fraction.';
}

/* Mode 2: show a fraction, pick the pad */
function buildShow(pz, ch){
  var f = makeFraction();
  answer = 'PAD';
  $('prompt').innerHTML = 'Which pad shows ' + fracHtml(f.n, f.d) + '?';
  var opts = [{ n: f.n, d: f.d, correct: true }];
  var guard = 0;
  while (opts.length < 3 && guard++ < 40) {
    var cand;
    if (Math.random() < 0.5) cand = { n: Math.max(1, Math.min(f.d - 1, f.n + (Math.random() < 0.5 ? 1 : -1))), d: f.d };
    else { var nd = DENOMS[Math.floor(Math.random() * DENOMS.length)]; cand = { n: Math.max(1, Math.min(nd - 1, f.n)), d: nd }; }
    var key = cand.n + '/' + cand.d;
    if (key !== f.n + '/' + f.d && !opts.some(function(o){ return o.n + '/' + o.d === key; })) { cand.correct = false; opts.push(cand); }
  }
  opts = shuffle(opts);
  opts.forEach(function(o){
    var b = document.createElement('button');
    b.className = 'choice';
    b.style.background = 'rgba(255,255,255,.9)';
    b.innerHTML = padSvg(o.n, o.d).replace('pad-svg pop', 'pad-svg').replace('viewBox="0 0 120 116"', 'viewBox="0 0 120 116" width="130"');
    b.setAttribute('aria-label', 'Pad showing ' + o.n + ' of ' + o.d);
    b.onclick = function(){ pick(b, o.correct === true); };
    ch.appendChild(b);
  });
  $('srStatus').textContent = 'Pick the lily pad that shows ' + f.n + ' out of ' + f.d + '.';
}

/* Mode 3: compare two fractions */
function buildCompare(pz, ch){
  var f1 = makeFraction(), f2 = makeFraction();
  var guard = 0;
  while (f1.n / f1.d === f2.n / f2.d && guard++ < 30) f2 = makeFraction();
  $('prompt').textContent = 'Which pad has more shaded?';
  pz.innerHTML =
    '<div><div style="font-weight:700;color:var(--ink-soft);margin-bottom:2px">Left</div>' + padSvg(f1.n, f1.d) + '</div>' +
    '<div><div style="font-weight:700;color:var(--ink-soft);margin-bottom:2px">Right</div>' + padSvg(f2.n, f2.d) + '</div>';
  var leftBigger = (f1.n / f1.d) > (f2.n / f2.d);
  answer = leftBigger ? 'L' : 'R';

  [['Left', f1, 'L'], ['Right', f2, 'R'], ['Same', null, 'S']].forEach(function(spec){
    var b = document.createElement('button');
    b.className = 'choice';
    b.style.minWidth = '110px';
    b.innerHTML = '<span style="font-family:\'Baloo 2\',sans-serif;font-weight:700;font-size:1.5rem;color:var(--teal-dark)">' + spec[0] + '</span>';
    b.onclick = function(){ pick(b, spec[2] === answer); };
    ch.appendChild(b);
  });
  $('srStatus').textContent = 'Compare the two pads. Left shows ' + f1.n + ' of ' + f1.d + '. Right shows ' + f2.n + ' of ' + f2.d + '.';
}

function renderFractionChoices(ch, opts, keyFn){
  opts = shuffle(opts);
  opts.forEach(function(o){
    var b = document.createElement('button');
    b.className = 'choice';
    b.innerHTML = fracHtml(o.n, o.d);
    b.setAttribute('aria-label', o.n + ' over ' + o.d);
    var correct = keyFn(o) === answer;
    b.onclick = function(){ pick(b, correct); };
    ch.appendChild(b);
  });
}

function pick(btn, correct){
  if (busy) return;
  if (correct) {
    busy = true;
    document.querySelectorAll('.choice').forEach(function(b){ b.disabled = true; });
    btn.classList.add('correct');
    if (firstTry) score++;
    $('scoreChip').textContent = 'Score ' + score;
    $('feedback').innerHTML = '<span class="hi">Yes! Nicely done.</span>';
    $('srStatus').textContent = 'Correct!';
    sndGood();
    setTimeout(nextRound, 1300);
  } else {
    firstTry = false;
    btn.classList.add('wrong', 'shake');
    btn.disabled = true;
    sndBad();
    $('feedback').textContent = 'Not quite. Look again and try another!';
    $('srStatus').textContent = 'Not quite. Try again.';
  }
}

function endGame(){
  $('gameScreen').classList.add('hidden');
  $('endScreen').classList.remove('hidden');
  var msg, stars;
  if (score >= 9) { msg = 'Fraction champion!'; stars = 3; }
  else if (score >= 7) { msg = 'Well sliced!'; stars = 2; }
  else { msg = 'Good fraction practice!'; stars = 1; }
  $('endTitle').textContent = msg;
  $('finalLine').textContent = 'You got ' + score + ' of ' + TOTAL_ROUNDS + ' on the first try.';
  var row = '';
  for (var i = 0; i < 3; i++) row += '<span class="' + (i < stars ? 'on' : 'off') + '">&#9733;</span>';
  $('starRow').innerHTML = row;
  $('srStatus').textContent = msg + ' Final score ' + score + ' of ' + TOTAL_ROUNDS + '.';
  sndWin();
}

document.addEventListener('keydown', function(e){
  if (e.key >= '1' && e.key <= '3') {
    var choices = document.querySelectorAll('.choice');
    var idx = parseInt(e.key, 10) - 1;
    if (choices[idx] && !choices[idx].disabled) choices[idx].click();
  }
});
</script>
</body>
</html>
